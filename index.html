<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/RL-Logo.png" />
    <link rel="apple-touch-icon" href="/RL-Logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Rocket Launchers — student-built high-power rocketry at the University of Texas Rio Grande Valley. Design, build, launch." />
    <title>Rocket Launchers — UTRGV Student Rocketry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Apply the saved theme before paint to avoid a flash. Default: dark.
      try {
        var t = localStorage.getItem('rl.theme');
        document.documentElement.dataset.theme = t === 'light' ? 'light' : 'dark';
      } catch (e) { document.documentElement.dataset.theme = 'dark'; }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
